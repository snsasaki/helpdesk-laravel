services:
    app:
        build: .
        container_name: helpdesk_app
        ports:
            - "8080:8080"
        volumes:
            - .:/var/www/
        depends_on:
            db:
                condition: service_healthy

    db:
        image: mysql:8.4
        container_name: helpdesk_db
        environment:
            MYSQL_DATABASE: helpdesk_db
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_USER: fybrid
            MYSQL_PASSWORD: fybrid
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    db_data:
